<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MovieVault // Daniel</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#38bdf8">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="authOverlay">
        <div class="auth-card">
            <div class="header-area">
                <h1>MOVIE<span>VAULT
                </span></h1>
            </div>
            <p style="font-size: 0.8rem; color: #64748b; margin-bottom: 24px;">Secure Entry Required</p>
            <div id="pinBoxes" class="pin-boxes">
                <input class="pin-box" type="password" inputmode="numeric" maxlength="1" pattern="\d*">
                <input class="pin-box" type="password" inputmode="numeric" maxlength="1" pattern="\d*">
                <input class="pin-box" type="password" inputmode="numeric" maxlength="1" pattern="\d*">
                <input class="pin-box" type="password" inputmode="numeric" maxlength="1" pattern="\d*">
            </div>
            <p id="pinError" class="pin-error"></p>
        </div>
    </div>

    <div id="mainApp" style="display: none;">
        <div class="header-area"><h1>MOVIE<span>VAULT</span></h1></div>

        <div id="searchDrawer" class="search-drawer">
            <div class="search-outer-wrapper">
                <div class="search-container">
                    <input type="text" id="movieInput" placeholder="Search movies" autocomplete="off">
                    <button id="clearSearch">✕</button>
                </div>
                <div class="content-wrapper">
                    <div id="searchResults"></div>
                </div>
            </div>
        </div>

        <button id="addBtn" onclick="toggleSearch()">＋</button>

        <div id="msg"></div>

        <div class="lists-container">
            <section id="watchlist" class="section-watchlist">
                <div class="content-wrapper">
                    <div class="section-header">
                        <h2>WATCHLIST</h2>
                        <div class="sort-container">
                            <button class="sort-btn active" id="sortAlpha" onclick="setSort('title')">A-Z</button>
                            <button class="sort-btn" id="sortYear" onclick="setSort('year')">Date</button>
                            <button class="sort-btn" id="sortRating" onclick="setSort('rating')">Stars</button>
                            <button class="sort-btn" id="sortRuntime" onclick="setSort('runtime')">Runtime</button>
                        </div>
                    </div>
                    <div id="wantList" class="movie-grid"></div>
                </div>
            </section>
            
            <section id="archive" class="section-archive">
                <div class="content-wrapper">
                    <div class="section-header">
                        <h2>ARCHIVE</h2>
                    </div>
                    <div id="watchedList" class="movie-grid archive-grid"></div>
                </div>
            </section>

            <section id="yts-section" class="section-yts">
                <div class="content-wrapper">
                    <div class="section-header">
                        <div style="display:flex; align-items:center; gap:12px;">
                            <h2>YTS</h2>
                            <span class="yts-badge">TORRENTS</span>
                        </div>
                        <button id="ytsToggleBtn" class="yts-toggle-btn" onclick="toggleYTS()">Browse ▾</button>
                    </div>
                    <div id="ytsDrawer" class="yts-drawer">
                        <div class="yts-filters">
                            <select id="ytsGenre" onchange="fetchYTS(1)">
                                <option value="">All Genres</option>
                                <option value="action">Action</option>
                                <option value="adventure">Adventure</option>
                                <option value="animation">Animation</option>
                                <option value="comedy">Comedy</option>
                                <option value="crime">Crime</option>
                                <option value="documentary">Documentary</option>
                                <option value="drama">Drama</option>
                                <option value="fantasy">Fantasy</option>
                                <option value="horror">Horror</option>
                                <option value="mystery">Mystery</option>
                                <option value="romance">Romance</option>
                                <option value="sci-fi">Sci-Fi</option>
                                <option value="thriller">Thriller</option>
                                <option value="western">Western</option>
                            </select>
                            <div class="yts-quality-pills">
                                <button class="yts-filter-btn active" onclick="setYTSQuality(this, '')">All</button>
                                <button class="yts-filter-btn" onclick="setYTSQuality(this, '720p')">720p</button>
                                <button class="yts-filter-btn" onclick="setYTSQuality(this, '1080p')">1080p</button>
                                <button class="yts-filter-btn" onclick="setYTSQuality(this, '2160p')">4K</button>
                            </div>
                            <select id="ytsSort" onchange="fetchYTS(1)">
                                <option value="download_count">Most Downloaded</option>
                                <option value="date_added">Latest</option>
                                <option value="seeds">Most Seeded</option>
                                <option value="rating">Top Rated</option>
                                <option value="year">Year</option>
                            </select>
                        </div>
                        <div id="ytsList" class="movie-grid"></div>
                        <div class="yts-pagination">
                            <button id="ytsLoadMore" class="yts-load-more" onclick="loadMoreYTS()">Load More</button>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <div id="rouletteWrapper" class="roulette-hidden">
            <button id="rouletteBtn" onclick="pickRandomMovie()">
                <span id="rouletteIcon">🎲</span>
                <span id="rouletteText">Pick a movie for me</span>
            </button>
        </div>

        <div id="detailsModal" onclick="closeModal()">
            <div class="modal-content" onclick="event.stopPropagation()">
                <button class="modal-close" onclick="closeModal()">✕</button>
                <div id="modalData"></div>
            </div>
        </div>

        <div id="torrentModal" onclick="closeTorrentModal()">
            <div class="modal-content torrent-modal-content" onclick="event.stopPropagation()">
                <button class="modal-close" onclick="closeTorrentModal()">✕</button>
                <div id="torrentModalData"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
